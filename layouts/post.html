<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.description }}">

  <link href="/style.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

<nav class="navbar">
  <div class="toggle-theme">
    <input type="checkbox" id="themeToggle" />
    <label for="themeToggle" class="switch"></label>
  </div>

  <div class="container">
    <a href="/" class="brand">Saheef</a>
    <ul class="nav-links">
      <li><a href="/#about">About</a></li>
      <li><a href="/#projects">Projects</a></li>
      <li><a href="/#contact">Contact</a></li>
    </ul>
  </div>
</nav>

<main class="container post-content">

  <h1>{{ page.title }}</h1>
  <p class="post-subtitle">{{ page.subtitle }}</p>

  <div class="post-meta">
    <i class="fas fa-calendar-alt"></i> <span>{{ page.date | date: "%Y-%m-%d" }}</span>
    <span class="dot">•</span>
    <i class="fas fa-feather-alt"></i> <span>{{ page.author }}</span>
  </div>

  {{ content }}

  <hr />

  <div class="share-buttons-icon" id="shareButtons"></div>

</main>

<footer>
  © <span id="year"></span> Saheef. All rights reserved.
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
