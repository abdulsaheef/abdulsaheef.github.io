<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{{ page.title }} | Saheef Library</title>
  <meta name="description" content="Saheef Knowledge Library">

  <link href="/style.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet" />
</head>

<body>

<!-- NAVBAR (same as your site) -->
<nav class="navbar">
  <div class="container">
    <a href="/" class="brand">Saheef</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/library/">Library</a></li>
    </ul>
  </div>
</nav>

<!-- MAIN -->
<main class="container">

  <header class="library-header">
    <h1>{{ page.title }}</h1>
    <p class="subtitle">Explore structured knowledge in Finance, Technology, and Law</p>
  </header>

  <!-- CONTENT -->
  <section class="library-content">
    {{ content }}
  </section>

</main>

<!-- FOOTER -->
<footer>
  © <span id="year"></span> Saheef. All rights reserved.
</footer>

<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
