<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.description }}">

  <link href="/style.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<!-- Improve layout for SEO -->
<meta property="og:title" content="{{ page.title }}">
<meta property="og:description" content="{{ page.description }}">
<meta property="og:type" content="article">
<meta property="og:url" content="{{ page.url | absolute_url }}">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title }}">
<meta name="twitter:description" content="{{ page.description }}">

</head>

<body>

<nav class="navbar">
  <div class="toggle-theme">
    <input type="checkbox" id="themeToggle" />
    <label for="themeToggle" class="switch"></label>
  </div>

  <div class="container">
    <a href="/" class="brand">Saheef</a>
    <ul class="nav-links">
      <li><a href="/#about">About</a></li>
      <li><a href="/#projects">Projects</a></li>
      <li><a href="/#contact">Contact</a></li>
    </ul>
  </div>
</nav>

<main class="container post-content">

  <h1>{{ page.title }}</h1>
  <p class="post-subtitle">{{ page.subtitle }}</p>

  <div class="post-meta">
    <i class="fas fa-calendar-alt"></i> <span>{{ page.date | date: "%Y-%m-%d" }}</span>
    <span class="dot">•</span>
    <i class="fas fa-feather-alt"></i> <span>{{ page.author }}</span>
  </div>

  {{ content }}

  <hr />

<div class="share-buttons-icon" id="shareButtons"></div>

<script>
  const shareURL = window.location.href;

  const shareHTML = `
    <a href="https://twitter.com/intent/tweet?url=${encodeURIComponent(shareURL)}" class="btn-icon twitter" target="_blank"><i class="fab fa-twitter"></i></a>

    <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareURL)}" class="btn-icon facebook" target="_blank"><i class="fab fa-facebook-f"></i></a>

    <a href="https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(shareURL)}" class="btn-icon linkedin" target="_blank"><i class="fab fa-linkedin-in"></i></a>

    <a href="https://api.whatsapp.com/send?text=${encodeURIComponent(shareURL)}" class="btn-icon whatsapp" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <a href="mailto:?subject=Check this article&body=${encodeURIComponent(shareURL)}" class="btn-icon email">
      <i class="fas fa-envelope"></i>
    </a>
  `;

  document.getElementById('shareButtons').innerHTML = shareHTML;
</script>

</main>

<footer>
  © <span id="year"></span> Saheef. All rights reserved.
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
