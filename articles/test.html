<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}">

  <link href="/style.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="toggle-theme">
      <input type="checkbox" id="themeToggle" />
      <label for="themeToggle" class="switch"></label>
    </div>

    <div class="container">
      <a href="/" class="brand">Saheef</a>
      <ul class="nav-links">
        <li><a href="/#about">About</a></li>
        <li><a href="/#projects">Projects</a></li>
        <li><a href="/#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- ARTICLE -->
  <main class="container post-content">

    <h1>{{POST_TITLE}}</h1>
    <p class="post-subtitle">{{SUBTITLE}}</p>

    <div class="post-meta">
      <i class="fas fa-calendar-alt"></i> <span>{{DATE}}</span>
      <span class="dot">•</span>
      <i class="fas fa-feather-alt"></i> <span>{{AUTHOR}}</span>
    </div>

    <!-- CONTENT START -->
    {{CONTENT}}
    <!-- CONTENT END -->

    <hr />

    <!-- SHARE -->
    <div class="share-buttons-icon" id="shareButtons"></div>

    <script>
      const shareURL = window.location.href;
      const shareHTML = `
        <a href="https://twitter.com/intent/tweet?url=${encodeURIComponent(shareURL)}" class="btn-icon twitter" target="_blank"><i class="fab fa-twitter"></i></a>
        <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareURL)}" class="btn-icon facebook" target="_blank"><i class="fab fa-facebook-f"></i></a>
        <a href="https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(shareURL)}" class="btn-icon linkedin" target="_blank"><i class="fab fa-linkedin-in"></i></a>
        <a href="https://api.whatsapp.com/send?text=${encodeURIComponent(shareURL)}" class="btn-icon whatsapp" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="mailto:?subject=Check%20this%20post&body=${encodeURIComponent(shareURL)}" class="btn-icon email"><i class="fas fa-envelope"></i></a>
      `;
      document.getElementById('shareButtons').innerHTML = shareHTML;
    </script>

  </main>

  <!-- FOOTER -->
  <footer>
    © <span id="year"></span> Saheef. All rights reserved.
  </footer>

  <!-- GLOBAL SCRIPT -->
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const toggle = document.getElementById('themeToggle');
    const body = document.body;

    if (localStorage.getItem('theme') === 'dark') {
      body.classList.add('dark-mode');
      toggle.checked = true;
    }

    toggle.addEventListener('change', () => {
      if (toggle.checked) {
        body.classList.add('dark-mode');
        localStorage.setItem('theme', 'dark');
      } else {
        body.classList.remove('dark-mode');
        localStorage.setItem('theme', 'light');
      }
    });
  </script>

</body>
</html>
